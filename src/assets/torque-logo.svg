<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1428;stop-opacity:1" />
    </linearGradient>

    <!-- Gold gradient for arc -->
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8843e;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#c8a96e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8c98e;stop-opacity:0.6" />
    </linearGradient>

    <!-- Gold gradient for T -->
    <linearGradient id="tGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c98e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8843e;stop-opacity:1" />
    </linearGradient>

    <!-- Bolt gold -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe099" />
      <stop offset="100%" style="stop-color:#c8a96e" />
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for arc -->
    <filter id="arcGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Inner shadow -->
    <filter id="innerShadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="3"/>
      <feComposite operator="out" in="SourceGraphic"/>
    </filter>

    <!-- Clip for rounded square -->
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- App icon background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture lines -->
  <g opacity="0.04" stroke="#c8a96e" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Outer ring - full circle, dark -->
  <circle cx="256" cy="256" r="188" fill="none" stroke="#1e1e2e" stroke-width="2"/>

  <!-- Tachometer arc: 210° sweep from ~150° to ~360° (bottom left to bottom right via top) -->
  <!-- Arc from 145deg to 395deg = 250 degrees of sweep -->
  <!-- Center 256,256 radius 172 -->
  <!-- Start point at 145deg: 256 + 172*cos(145°), 256 + 172*sin(145°) -->
  <!-- cos(145°)=-0.8192, sin(145°)=0.5736 → 114.9, 354.7 -->
  <!-- End point at 35deg: 256 + 172*cos(35°), 256 + 172*sin(35°) -->
  <!-- cos(35°)=0.8192, sin(35°)=0.5736 → 396.9, 354.7 -->

  <!-- Background arc track -->
  <path d="M 115 355 A 172 172 0 1 1 397 355"
    fill="none" stroke="#1a1a28" stroke-width="20" stroke-linecap="round"/>

  <!-- Colored arc (active zone) - split into segments for color effect -->
  <!-- Green zone: start to ~60% -->
  <path d="M 115 355 A 172 172 0 0 1 132 142"
    fill="none" stroke="#2ecc71" stroke-width="8" stroke-linecap="round" opacity="0.5"/>

  <!-- Yellow zone: ~60% to ~80% -->
  <path d="M 132 142 A 172 172 0 0 1 330 108"
    fill="none" stroke="#f1c40f" stroke-width="8" stroke-linecap="round" opacity="0.6"/>

  <!-- Red zone: ~80% to end -->
  <path d="M 330 108 A 172 172 0 0 1 397 355"
    fill="none" stroke="#e74c3c" stroke-width="8" stroke-linecap="round" opacity="0.6"/>

  <!-- Gold highlight arc overlay — glowing needle sweep line -->
  <path d="M 115 355 A 172 172 0 1 1 397 355"
    fill="none" stroke="url(#arcGrad)" stroke-width="3" stroke-linecap="round" filter="url(#arcGlow)"/>

  <!-- Tick marks around the arc -->
  <g stroke="#c8a96e" stroke-width="2" opacity="0.5">
    <!-- Major ticks at each 25deg step along the 250deg arc starting at 145deg -->
    <!-- 145, 170, 195, 220, 245, 270, 295, 320, 345, 370(=10), 395(=35) = 11 positions, 10 intervals -->
    <g transform="rotate(145 256 256)"><line x1="256" y1="84" x2="256" y2="96"/></g>
    <g transform="rotate(170 256 256)"><line x1="256" y1="84" x2="256" y2="96"/></g>
    <g transform="rotate(195 256 256)"><line x1="256" y1="84" x2="256" y2="96"/></g>
    <g transform="rotate(220 256 256)"><line x1="256" y1="84" x2="256" y2="96"/></g>
    <g transform="rotate(245 256 256)"><line x1="256" y1="84" x2="256" y2="96"/></g>
    <g transform="rotate(270 256 256)"><line x1="256" y1="84" x2="256" y2="96"/></g>
    <g transform="rotate(295 256 256)"><line x1="256" y1="84" x2="256" y2="96"/></g>
    <g transform="rotate(320 256 256)"><line x1="256" y1="84" x2="256" y2="96"/></g>
    <g transform="rotate(345 256 256)"><line x1="256" y1="84" x2="256" y2="96"/></g>
    <g transform="rotate(370 256 256)"><line x1="256" y1="84" x2="256" y2="96"/></g>
    <g transform="rotate(395 256 256)"><line x1="256" y1="84" x2="256" y2="96"/></g>
  </g>

  <!-- Minor ticks -->
  <g stroke="#c8a96e" stroke-width="1" opacity="0.25">
    <g transform="rotate(157.5 256 256)"><line x1="256" y1="84" x2="256" y2="91"/></g>
    <g transform="rotate(182.5 256 256)"><line x1="256" y1="84" x2="256" y2="91"/></g>
    <g transform="rotate(207.5 256 256)"><line x1="256" y1="84" x2="256" y2="91"/></g>
    <g transform="rotate(232.5 256 256)"><line x1="256" y1="84" x2="256" y2="91"/></g>
    <g transform="rotate(257.5 256 256)"><line x1="256" y1="84" x2="256" y2="91"/></g>
    <g transform="rotate(282.5 256 256)"><line x1="256" y1="84" x2="256" y2="91"/></g>
    <g transform="rotate(307.5 256 256)"><line x1="256" y1="84" x2="256" y2="91"/></g>
    <g transform="rotate(332.5 256 256)"><line x1="256" y1="84" x2="256" y2="91"/></g>
    <g transform="rotate(357.5 256 256)"><line x1="256" y1="84" x2="256" y2="91"/></g>
    <g transform="rotate(382.5 256 256)"><line x1="256" y1="84" x2="256" y2="91"/></g>
  </g>

  <!-- Needle — pointing to ~80% = ~345deg -->
  <g filter="url(#glow)">
    <!-- Needle body -->
    <line x1="256" y1="256" x2="256" y2="104"
      stroke="url(#boltGrad)" stroke-width="3.5" stroke-linecap="round"
      transform="rotate(340 256 256)"/>
    <!-- Needle thin tail -->
    <line x1="256" y1="256" x2="256" y2="290"
      stroke="#c8a96e" stroke-width="2" stroke-linecap="round" opacity="0.4"
      transform="rotate(340 256 256)"/>
  </g>

  <!-- Center hub -->
  <circle cx="256" cy="256" r="18" fill="#1a1428" stroke="#c8a96e" stroke-width="2"/>
  <circle cx="256" cy="256" r="7" fill="url(#boltGrad)"/>

  <!-- Bold T letterform centered in lower half of dial -->
  <g filter="url(#glow)">
    <!-- T crossbar -->
    <rect x="200" y="290" width="112" height="22" rx="4" fill="url(#tGrad)"/>
    <!-- T stem -->
    <rect x="245" y="308" width="22" height="72" rx="4" fill="url(#tGrad)"/>
  </g>

  <!-- Bottom wordmark -->
  <text x="256" y="466"
    font-family="'DM Sans', 'Helvetica Neue', sans-serif"
    font-size="36"
    font-weight="700"
    letter-spacing="10"
    text-anchor="middle"
    fill="#c8a96e"
    opacity="0.9">TORQUE</text>

  <!-- Subtle bottom reflection/sheen -->
  <rect x="0" y="400" width="512" height="112" rx="0" fill="url(#bgGrad)" opacity="0.3"/>

  <!-- Top sheen -->
  <ellipse cx="256" cy="80" rx="160" ry="30" fill="white" opacity="0.02"/>
</svg>
